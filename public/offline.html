<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Lumina — You're offline</title>
    <meta name="theme-color" content="#fdf3f7" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        min-height: 100dvh;
        font-family: "Plus Jakarta Sans", ui-sans-serif, system-ui, -apple-system, sans-serif;
        color: #4b2a3a;
        background: radial-gradient(1200px 800px at 20% 10%, #ffe3ee 0%, transparent 60%),
                    radial-gradient(1000px 700px at 80% 90%, #fbd2e4 0%, transparent 55%),
                    linear-gradient(180deg, #fdf3f7 0%, #f8e2ec 100%);
        -webkit-font-smoothing: antialiased;
      }
      main {
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: max(24px, env(safe-area-inset-top)) 24px max(24px, env(safe-area-inset-bottom));
      }
      .card {
        max-width: 460px;
        width: 100%;
        text-align: center;
        padding: 40px 28px;
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.55);
        backdrop-filter: blur(24px) saturate(140%);
        -webkit-backdrop-filter: blur(24px) saturate(140%);
        border: 1px solid rgba(255, 255, 255, 0.7);
        box-shadow: 0 20px 60px -20px rgba(180, 80, 130, 0.25);
      }
      .glyph {
        width: 72px; height: 72px;
        margin: 0 auto 22px;
        border-radius: 22px;
        background: linear-gradient(135deg, #ffd7e6, #fbb4cc);
        display: grid; place-items: center;
        font-family: "Fraunces", Georgia, serif;
        font-size: 40px;
        font-weight: 600;
        color: #b0577a;
        box-shadow: inset 0 0 24px rgba(255,255,255,0.6), 0 8px 24px -12px rgba(176, 87, 122, 0.6);
      }
      h1 {
        font-family: "Fraunces", Georgia, serif;
        font-weight: 500;
        font-size: 28px;
        line-height: 1.15;
        margin: 0 0 12px;
        letter-spacing: -0.01em;
        color: #3a1e2b;
      }
      p {
        margin: 0 0 8px;
        font-size: 15px;
        line-height: 1.6;
        color: #6b4657;
      }
      .muted { color: #916b7c; font-size: 13px; margin-top: 18px; }
      button {
        margin-top: 22px;
        appearance: none;
        border: none;
        cursor: pointer;
        padding: 12px 22px;
        border-radius: 999px;
        font: inherit;
        font-weight: 600;
        font-size: 14px;
        color: #fff;
        background: linear-gradient(135deg, #d97fa5, #b45c82);
        box-shadow: 0 10px 24px -10px rgba(180, 92, 130, 0.7);
        transition: transform .15s ease, box-shadow .2s ease;
      }
      button:hover { transform: translateY(-1px); }
      button:active { transform: translateY(0); }
      .dot {
        display: inline-block; width: 8px; height: 8px; border-radius: 50%;
        background: #e08aaa; margin-right: 8px; vertical-align: middle;
        box-shadow: 0 0 0 4px rgba(224, 138, 170, 0.25);
        animation: pulse 1.8s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: .4; }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card" role="status" aria-live="polite">
        <div class="glyph" aria-hidden="true">L</div>
        <h1>You're offline</h1>
        <p>Your downloaded memories are still here.</p>
        <p>We'll reconnect as soon as you're back online.</p>
        <button type="button" onclick="location.reload()">
          <span class="dot"></span>Try again
        </button>
        <p class="muted">Lumina keeps your sanctuary close, even without a signal.</p>
      </section>
    </main>
    <script>
      window.addEventListener("online", function () { location.reload(); });
    </script>
  </body>
</html>
